<app-modal 
  [open]="open" 
  title="Selecionar Paciente" 
  subtitle="Escolha o paciente que você está atendendo agora"
  (fechar)="onClose()"
  [hasFooter]="true"
>
  <!-- Barra de Busca -->
  <div class="relative mb-4">
    <lucide-icon [img]="SearchIcon" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></lucide-icon>
    <input
      [(ngModel)]="searchQuery"
      placeholder="Buscar paciente..."
      class="pl-9 pr-4 py-2.5 w-full rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm transition"
    />
  </div>

  <!-- Lista de Pacientes -->
  <div class="space-y-2 max-h-[320px] overflow-y-auto">
    @for (p of filteredPatients; track p.name) {
      <button
        (click)="selecionarPaciente(p.name)"
        class="w-full flex items-center gap-3 p-3 rounded-2xl text-left transition border cursor-pointer"
        [class.bg-blue-50]="selectedPatient === p.name"
        [class.border-blue-200]="selectedPatient === p.name"
        [class.bg-white]="selectedPatient !== p.name"
        [class.border-slate-100]="selectedPatient !== p.name"
        [class.hover:bg-slate-50]="selectedPatient !== p.name"
      >
        <!-- Avatar / Iniciais -->
        <div class="w-11 h-11 rounded-full bg-gradient-to-br {{ p.tone }} flex items-center justify-center text-white font-bold text-sm shrink-0">
          {{ p.initials }}
        </div>
        
        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-slate-900 truncate">{{ p.name }}</div>
          <div class="text-xs text-slate-500">{{ p.age }} anos</div>
        </div>
        
        <!-- Check de Selecionado -->
        @if (selectedPatient === p.name) {
          <lucide-icon [img]="CheckIcon" class="w-5 h-5 text-blue-600"></lucide-icon>
        }
      </button>
    }
    
    <!-- Mensagem se a busca não encontrar nada -->
    @if (filteredPatients.length === 0) {
      <div class="text-center py-6 text-slate-500 text-sm">
        Nenhum paciente encontrado.
      </div>
    }
  </div>

  <!-- Botões do Rodapé -->
  <button 
    modal-footer 
    (click)="onClose()" 
    class="px-4 py-2 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-100 cursor-pointer transition"
  >
    Cancelar
  </button>
  <button 
    modal-footer 
    (click)="onConfirmar()" 
    class="px-4 py-2 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white shadow-md shadow-blue-600/20 cursor-pointer transition"
  >
    Confirmar Seleção
  </button>
</app-modal>
