@if (open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" (click)="fechar.emit()"></div>
    <div class="relative w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <h3 class="text-xl font-bold text-slate-900">Admitir Paciente</h3>
        <button (click)="fechar.emit()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition cursor-pointer">
          <lucide-icon [img]="XIcon" class="w-5 h-5"></lucide-icon>
        </button>
      </div>
      <div class="p-6">
        <div class="bg-blue-50 text-blue-800 p-4 rounded-2xl mb-6 text-sm">
          Você está prestes a admitir o paciente <strong>{{ caseData?.nomePaciente }}</strong>. Ao confirmar, a vaga de atendimento será ocupada no sistema e a ambulância notificada.
        </div>
        <div class="flex gap-3">
          <button (click)="fechar.emit()" class="px-6 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-100 transition w-full cursor-pointer">
            Cancelar
          </button>
          <button (click)="confirmar()" [disabled]="isEnviando" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition w-full flex justify-center items-center cursor-pointer disabled:opacity-50">
            @if(isEnviando) { <lucide-icon [img]="Loader2Icon" class="w-4 h-4 mr-2 animate-spin"></lucide-icon> A processar... } @else { Confirmar Aceite }
          </button>
        </div>
      </div>
    </div>
  </div>
}
