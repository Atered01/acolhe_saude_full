<div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none w-full max-w-sm">
  
  @for (toast of toastService.toasts$ | async; track toast.id) {
    <div 
      class="pointer-events-auto flex items-start gap-3 p-4 rounded-2xl shadow-xl shadow-slate-200/50 transform transition-all duration-300 animate-in slide-in-from-right-8 fade-in border"
      [ngClass]="{
        'bg-white border-emerald-100': toast.tipo === 'sucesso',
        'bg-white border-red-100': toast.tipo === 'erro',
        'bg-white border-blue-100': toast.tipo === 'aviso'
      }"
    >
      
      <div class="shrink-0 mt-0.5">
        @if (toast.tipo === 'sucesso') { <lucide-icon [img]="CheckCircle2Icon" class="w-5 h-5 text-emerald-500"></lucide-icon> }
        @if (toast.tipo === 'erro') { <lucide-icon [img]="AlertCircleIcon" class="w-5 h-5 text-red-500"></lucide-icon> }
        @if (toast.tipo === 'aviso') { <lucide-icon [img]="InfoIcon" class="w-5 h-5 text-blue-500"></lucide-icon> }
      </div>

      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-slate-800">{{ toast.mensagem }}</p>
      </div>

      <button (click)="fechar(toast.id)" class="shrink-0 text-slate-400 hover:text-slate-600 transition cursor-pointer">
        <lucide-icon [img]="XIcon" class="w-4 h-4"></lucide-icon>
      </button>
      
    </div>
  }

</div>
