<div class="min-h-screen bg-slate-50 flex">

  <aside class="hidden lg:flex flex-col w-72 bg-white border-r border-slate-200 p-6">
    <div class="flex items-center gap-2 mb-10">
      <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center text-white">
        <lucide-icon [img]="HeartIcon" class="w-6 h-6"></lucide-icon>
      </div>
      <div>
        <div class="font-bold text-slate-900">Acolhe Saúde</div>
        <div class="text-xs text-slate-500">Painel do Cuidador</div>
      </div>
    </div>

   <nav class="space-y-1 flex-1">
      
      @for (item of navItems; track item.to) {
      <a [routerLink]="item.to" routerLinkActive="bg-blue-50 text-blue-700" [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition text-slate-600 hover:bg-slate-50 hover:text-slate-900 cursor-pointer">
        <lucide-icon [img]="item.icon" class="w-5 h-5"></lucide-icon>
        {{ item.label }}
      </a>
      }

      <button (click)="abrirUltimaTriagem()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition text-slate-600 hover:bg-slate-50 hover:text-slate-900 cursor-pointer">
        <lucide-icon [img]="StethoscopeIcon" class="w-5 h-5"></lucide-icon>
        Última Triagem
      </button>

    </nav>

    <div class="border-t border-slate-200 pt-4 space-y-1">

      <a routerLink="/perfil" routerLinkActive="bg-blue-50 text-blue-700"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition">
        <lucide-icon [img]="SettingsIcon" class="w-5 h-5"></lucide-icon> Meu Perfil
      </a>

      <button (click)="authService.logout()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition text-red-600 hover:bg-red-50 hover:text-red-700 cursor-pointer">
        <lucide-icon [img]="LogOutIcon" class="w-5 h-5"></lucide-icon> Sair
      </button>
    </div>

    <div class="mt-4 p-4 rounded-2xl bg-gradient-to-br from-blue-600 to-emerald-500 text-white">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white/30 flex items-center justify-center font-semibold">MA</div>
        <div>
          <div class="text-sm font-semibold">Maria Aparecida</div>
          <div class="text-xs text-white/80">Cuidadora</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 min-w-0 flex flex-col h-screen overflow-y-auto">

    <header
      class="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-slate-200 px-6 lg:px-10 py-4 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">

        <div class="hidden md:block relative">
          <lucide-icon [img]="SearchIcon"
            class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></lucide-icon>
          <input type="text" placeholder="Buscar paciente ou triagem..."
            class="pl-9 pr-4 py-2 rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm w-64 transition" />
        </div>

        <button (click)="modalTrocarPacienteAberto = true"
          class="hidden sm:inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-semibold text-slate-700 transition cursor-pointer">
          <lucide-icon [img]="UsersIcon" class="w-4 h-4"></lucide-icon> Trocar paciente
        </button>

        <div class="relative">
          <button (click)="notificacoesAbertas = !notificacoesAbertas"
            class="relative w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition cursor-pointer">
            <lucide-icon [img]="BellIcon" class="w-5 h-5 text-slate-700"></lucide-icon>
            <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
          </button>

          <app-notifications-dropdown [open]="notificacoesAbertas" (fechar)="notificacoesAbertas = false">
          </app-notifications-dropdown>
        </div>

      </div>
    </header>

    <div class="p-6 lg:p-10">
      <router-outlet></router-outlet>
    </div>

  </main>

  <app-patient-switcher-modal [open]="modalTrocarPacienteAberto" (fechar)="modalTrocarPacienteAberto = false"
    (confirmar)="trocarPacienteGlobal($event)">
  </app-patient-switcher-modal>

</div>
