<div class="min-h-screen bg-slate-900 flex text-slate-100">

  <aside class="hidden lg:flex flex-col w-72 bg-slate-950 border-r border-slate-800 p-6">
    <div class="flex items-center gap-2 mb-10">
      <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center">
        <lucide-icon [img]="StethoscopeIcon" class="w-6 h-6 text-white"></lucide-icon>
      </div>
      <div>
        <div class="font-bold">Acolhe Clínica</div>
        <div class="text-xs text-slate-400">Painel Médico</div>
      </div>
    </div>

    <nav class="space-y-1 flex-1">
      @for (item of navItems; track item.to) {
      <a [routerLink]="item.to" routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-600/30"
        [routerLinkActiveOptions]="{exact: true}"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition text-slate-400 hover:bg-slate-800 hover:text-white cursor-pointer">
        <lucide-icon [img]="item.icon" class="w-5 h-5"></lucide-icon>
        {{ item.label }}
      </a>
      }
    </nav>

    <button (click)="authService.logout()"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition cursor-pointer">
      <lucide-icon [img]="LogOutIcon" class="w-5 h-5"></lucide-icon> Sair
    </button>

    <div class="mt-4 p-4 rounded-2xl bg-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-semibold text-white">DR
        </div>
        <div>
          <div class="text-sm font-semibold">Dr. Ricardo Lima</div>
          <div class="text-xs text-slate-400">Cardiologista</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 min-w-0 bg-slate-50 text-slate-900 flex flex-col h-screen overflow-y-auto">

    <header
      class="sticky top-0 z-10 bg-white border-b border-slate-200 px-6 lg:px-10 py-4 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-3">

        <div class="relative">
          <button (click)="notificacoesAbertas = !notificacoesAbertas"
            class="relative w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition cursor-pointer">
            <lucide-icon [img]="BellIcon" class="w-5 h-5 text-slate-700"></lucide-icon>
            <span
              class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>
          </button>

          <app-notifications-dropdown [open]="notificacoesAbertas" (fechar)="notificacoesAbertas = false">
          </app-notifications-dropdown>
        </div>

      </div>
    </header>

    <div class="p-0">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
