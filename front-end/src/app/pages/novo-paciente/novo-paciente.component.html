<div class="min-h-screen bg-slate-50 p-4 md:p-8">
  <div class="max-w-2xl mx-auto">

    <a routerLink="/dashboard"
      class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-slate-700 mb-6 transition cursor-pointer">
      <lucide-icon [img]="ArrowLeftIcon" class="w-4 h-4"></lucide-icon>
      Voltar para o Dashboard
    </a>

    <div class="bg-white rounded-3xl shadow-md p-6 md:p-8 border border-slate-100">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center">
          <lucide-icon [img]="UserPlusIcon" class="w-6 h-6"></lucide-icon>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900">Cadastrar Novo Paciente</h1>
          <p class="text-sm text-slate-500">Insira os dados clínicos essenciais para o acompanhamento e triagem de IA.
          </p>
        </div>
      </div>

      <form (ngSubmit)="salvar()" class="space-y-6">

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Nome Completo *</label>
          <input type="text" [(ngModel)]="novoPaciente.nomeCompleto" name="nomeCompleto" required
            placeholder="Ex: Maria do Carmo Silva"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition">
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Data de Nascimento</label>
            <input type="date" [(ngModel)]="novoPaciente.dataNascimento" name="dataNascimento"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition">
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Documento de Identificação *</label>
            <input type="text" [(ngModel)]="novoPaciente.documentoIdentificacao" name="documentoIdentificacao" required
              placeholder="Ex: 123.456.789-00"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition">
          </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Tipo Sanguíneo</label>
            <select [(ngModel)]="novoPaciente.tipoSanguineo" name="tipoSanguineo"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none bg-white transition">
              <option value="">Selecione uma opção</option>
              @for (tipo of tiposSanguineos; track tipo) {
              <option [value]="tipo">{{ tipo }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">Nome do Abrigo / Instituição</label>
            <input type="text" [(ngModel)]="novoPaciente.nomeAbrigo" name="nomeAbrigo"
              placeholder="Ex: Abrigo Esperança"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none transition">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Condições Médicas Prévias
            (Comorbidades)</label>
          <textarea [(ngModel)]="novoPaciente.condicoesPrevias" name="condicoesPrevias" rows="4"
            placeholder="Ex: Hipertensão arterial, Diabetes Tipo 2, Alergia à Penicilina..."
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none resize-none transition"></textarea>
        </div>

        <div class="pt-4 border-t border-slate-100 flex gap-4">
          <a routerLink="/dashboard"
            class="w-full px-6 py-3.5 border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold rounded-xl text-center transition cursor-pointer">
            Cancelar
          </a>
          <button type="submit" [disabled]="isSalvando"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md shadow-blue-600/10 transition inline-flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50">
            @if (isSalvando) {
            <lucide-icon [img]="Loader2Icon" class="w-5 h-5 animate-spin"></lucide-icon>
            Salvando...
            } @else {
            Salvar Cadastro
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
