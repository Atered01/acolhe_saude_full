<div class="min-h-screen bg-slate-50 p-4 md:p-8">
  <header class="mb-8 max-w-3xl mx-auto flex items-center gap-4">
    <a routerLink="/dashboard" class="p-2 bg-white rounded-xl shadow-sm border border-slate-200 text-slate-500 hover:text-blue-600 transition cursor-pointer">
      <lucide-icon [img]="ArrowLeftIcon" class="w-5 h-5"></lucide-icon>
    </a>
    <h1 class="text-2xl font-bold text-slate-900">Relatar Sintoma</h1>
  </header>

  <div class="max-w-3xl mx-auto">
    
    <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
      <label class="block text-sm font-bold text-slate-900 mb-2 flex items-center gap-2">
        <lucide-icon [img]="UserIcon" class="w-4 h-4 text-blue-600"></lucide-icon>
        Para qual paciente é este sintoma? *
      </label>
      <select [(ngModel)]="pacienteSelecionado" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none bg-white transition text-slate-700">
        <option [ngValue]="null">Selecione um paciente da lista...</option>
        @for (p of pacientes; track p.idPaciente) {
          <option [ngValue]="p.idPaciente">{{ p.nomeCompleto }}</option>
        }
      </select>
    </div>

    <div class="bg-white rounded-2xl shadow-md p-6">
      <label class="block text-sm font-bold text-slate-900 mb-3">Descreva o que está a acontecer</label>
      <div class="relative">
        <textarea
          [(ngModel)]="relatoSintomas"
          rows="6"
          placeholder="Conte os sintomas com as suas próprias palavras..."
          class="w-full p-4 pr-16 rounded-xl border border-slate-200 focus:border-blue-600 focus:ring-2 focus:ring-blue-100 outline-none resize-none text-base leading-relaxed"
        ></textarea>
        
        <button
          type="button"
          (click)="toggleRecording()"
          [ngClass]="recording ? 'bg-red-500 animate-pulse' : 'bg-blue-600 hover:bg-blue-700'"
          class="absolute right-3 bottom-3 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-md transition cursor-pointer"
          title="Falar em vez de digitar"
        >
          <lucide-icon [img]="MicIcon" class="w-5 h-5"></lucide-icon>
        </button>
      </div>

      <div class="mt-6">
        <div class="text-sm font-medium text-slate-700 mb-3">Seleção rápida de sintomas</div>
        <div class="flex flex-wrap gap-2">
          @for (c of quickChips; track c) {
            <button
              type="button"
              (click)="toggleChip(c)"
              [ngClass]="isActive(c) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-700 border-slate-200 hover:border-blue-400'"
              class="px-4 py-2 rounded-full text-sm font-medium border transition cursor-pointer"
            >
              {{ c }}
            </button>
          }
        </div>
      </div>

      <button
        (click)="enviarParaIA()"
        [disabled]="isEnviando"
        class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl shadow-md shadow-blue-600/20 inline-flex items-center justify-center gap-2 text-lg transition cursor-pointer disabled:opacity-75 disabled:cursor-wait"
      >
        @if (isEnviando) {
          <lucide-icon [img]="Loader2Icon" class="w-5 h-5 animate-spin"></lucide-icon>
          A enviar para a IA...
        } @else {
          <lucide-icon [img]="SparklesIcon" class="w-5 h-5"></lucide-icon>
          Analisar com IA
        }
      </button>
    </div>
  </div>
</div>
