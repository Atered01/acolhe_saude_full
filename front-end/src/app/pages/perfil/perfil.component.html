<div class="max-w-3xl space-y-6">
  
  <!-- Cabeçalho do Perfil -->
  <div class="bg-white rounded-2xl shadow-md p-6 flex flex-col sm:flex-row items-center sm:items-start gap-6">
    
    <!-- Avatar -->
    <div class="relative">
      <div class="w-28 h-28 rounded-3xl bg-gradient-to-br from-blue-600 to-emerald-500 flex items-center justify-center text-white font-bold text-3xl shadow-md">
        {{ iniciais }}
      </div>
      <button 
        (click)="alterarFoto()" 
        class="absolute -bottom-2 -right-2 w-10 h-10 rounded-full bg-white shadow-md ring-1 ring-slate-200 flex items-center justify-center text-slate-700 hover:bg-slate-50 transition cursor-pointer"
      >
        <lucide-icon [img]="CameraIcon" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
    
    <!-- Infos Rápidas -->
    <div class="flex-1 text-center sm:text-left">
      <h2 class="text-xl font-bold text-slate-900">{{ usuario.nome }}</h2>
      <p class="text-sm text-slate-500">Cuidadora • Há 2 anos no Acolhe Saúde</p>
      <button 
        (click)="alterarFoto()" 
        class="mt-3 text-sm font-semibold text-blue-600 hover:text-blue-700 transition cursor-pointer"
      >
        Alterar foto
      </button>
    </div>
  </div>

  <!-- Dados Pessoais (Formulário) -->
  <div class="bg-white rounded-2xl shadow-md p-6">
    <h3 class="font-semibold text-slate-900 mb-5">Dados pessoais</h3>
    
    <form (ngSubmit)="salvarAlteracoes()">
      <div class="grid sm:grid-cols-2 gap-4">
        
        <!-- Campo: Nome -->
        <div>
          <label class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Nome completo</label>
          <input 
            type="text" 
            name="nome" 
            [(ngModel)]="usuario.nome" 
            class="mt-1.5 w-full px-4 py-2.5 rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm transition" 
          />
        </div>
        
        <!-- Campo: Email -->
        <div>
          <label class="text-xs font-semibold text-slate-700 uppercase tracking-wide">E-mail</label>
          <input 
            type="email" 
            name="email" 
            [(ngModel)]="usuario.email" 
            class="mt-1.5 w-full px-4 py-2.5 rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm transition" 
          />
        </div>
        
        <!-- Campo: Telefone -->
        <div>
          <label class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Telefone</label>
          <input 
            type="text" 
            name="telefone" 
            [(ngModel)]="usuario.telefone" 
            class="mt-1.5 w-full px-4 py-2.5 rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm transition" 
          />
        </div>
        
        <!-- Campo: Data Nascimento -->
        <div>
          <label class="text-xs font-semibold text-slate-700 uppercase tracking-wide">Data de nascimento</label>
          <input 
            type="text" 
            name="dataNascimento" 
            [(ngModel)]="usuario.dataNascimento" 
            class="mt-1.5 w-full px-4 py-2.5 rounded-xl bg-slate-100 border border-transparent focus:bg-white focus:border-blue-600 outline-none text-sm transition" 
          />
        </div>
      </div>
      
      <!-- Botão Salvar -->
      <div class="mt-6 flex justify-end">
        <button 
          type="submit" 
          class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white shadow-md shadow-blue-600/20 inline-flex items-center gap-2 transition cursor-pointer"
        >
          <lucide-icon [img]="SaveIcon" class="w-4 h-4"></lucide-icon> Salvar alterações
        </button>
      </div>
    </form>
  </div>

  <!-- Segurança -->
  <div class="bg-white rounded-2xl shadow-md p-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <h3 class="font-semibold text-slate-900">Segurança</h3>
        <p class="text-sm text-slate-500 mt-0.5">Atualize sua senha periodicamente.</p>
      </div>
      <button 
        (click)="trocarSenha()" 
        class="px-4 py-2.5 rounded-xl text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-900 inline-flex items-center justify-center gap-2 transition cursor-pointer shrink-0"
      >
        <lucide-icon [img]="KeyRoundIcon" class="w-4 h-4"></lucide-icon> Trocar senha
      </button>
    </div>
  </div>
  
</div>
